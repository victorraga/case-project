version: '3.8'

services:
  contacts-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contacts-book-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - contacts-db:/app
    restart: unless-stopped
    networks:
      - contacts-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('https').get('https://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  contacts-db:
    driver: local

networks:
  contacts-network:
    driver: bridge
